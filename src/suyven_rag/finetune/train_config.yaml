# =============================================================================
# Suyven Fine-Tuning Config — Axolotl-style YAML-driven training
# =============================================================================
# Every experiment is reproducible from this single file.
# Override any field via CLI: --override model.lora_rank=16
#
# Inspired by: Axolotl (config-driven), LlamaFactory (multi-method),
#              Unsloth (GPU optimizations), TRL (DPO training)
# =============================================================================

# --- Experiment ---
experiment:
  name: "lora_v2_reranker_filtered"
  tags: ["v2", "cross-encoder-filtered", "rank8"]
  description: "LoRA fine-tuning with V2 data (cross-encoder filtered pairs)"

# --- Base Model ---
model:
  name: "BAAI/bge-m3"
  hf_path: "BAAI/bge-m3"
  embedding_dim: 1024
  max_seq_length: 256

# --- LoRA Adapter ---
adapter:
  method: "lora"           # lora | full | qlora (future)
  rank: 8
  alpha: 16
  dropout: 0.1
  target_modules:
    - "query"
    - "value"
  # Future: key, dense layers

# --- Dataset ---
dataset:
  train_data: "data/finetune/pairs_v2.jsonl"
  triplets_data: null      # Optional hard negatives
  eval_split: 0.1
  max_samples: null         # null = use all
  seed: 42

# --- Training ---
training:
  epochs: 10
  batch_size: 32
  gradient_accumulation_steps: 1
  learning_rate: 5.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Loss
  loss: "mnrl"             # mnrl (InfoNCE) | triplet | combined
  temperature: 0.05        # For InfoNCE
  triplet_margin: 0.3      # For triplet loss

  # Scheduler
  scheduler: "cosine"      # cosine | linear | constant

  # Precision (Unsloth-inspired)
  fp16: true
  gradient_checkpointing: false  # Enable for larger models

# --- GPU Optimization (Unsloth-inspired) ---
optimization:
  padding_free: true        # Remove padding waste from batches
  dynamic_batching: true    # Bucket sequences by length
  pin_memory: true
  num_workers: 2
  prefetch_factor: 2

# --- Evaluation ---
evaluation:
  eval_every_epoch: true
  metrics:
    - "eval_loss"
    - "accuracy"           # pos > neg discrimination
    - "margin"             # avg(cos(q,pos) - cos(q,neg))
    - "mrr_at_10"          # Mean Reciprocal Rank
  early_stopping:
    enabled: false
    patience: 3
    min_delta: 0.001

# --- Data Generation ---
data_gen:
  strategy: "v2_hybrid"    # v1_selfsup | v2_hybrid | groq_llm
  target_pairs: 3000
  reranker_min_score: 0.2  # Cross-encoder quality gate
  strategies:
    - "first_sentence"
    - "definition"
    - "question_reformat"
  groq:
    model: "llama-3.3-70b-versatile"
    batch_size: 5
    delay_s: 3.0
    max_retries: 3

# --- Output ---
output:
  dir: "data/finetune/checkpoints"
  save_lora_weights: true
  save_merged_model: true
  save_loss_curve: true
  experiment_tracking: true
